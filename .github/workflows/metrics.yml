name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # daily
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics SVG
        uses: lowlighter/metrics@latest
        with:
          # Works with the built-in GITHUB_TOKEN for public stats. For richer
          # plugins (private contributions, isocalendar, etc.) create a PAT and
          # add it as a repo secret named METRICS_TOKEN — this picks it up
          # automatically when present.
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: ZL154
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/London
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8
